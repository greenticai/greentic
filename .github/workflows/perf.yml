name: Perf (lightweight)
# Moved off pull_request onto a nightly schedule. See plans/binary-bifurcation.md
# Phase A (heavy-job sweep). Manual runs remain via workflow_dispatch.

on:
  schedule:
    - cron: "39 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          toolchain: 1.95.0

      - name: Run perf guard tests
        run: cargo test --test perf_scaling --test perf_timeout

      - name: Run benchmark smoke
        run: cargo bench --bench perf -- --sample-size 10
