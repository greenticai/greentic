name: Publish And Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/host-crate-ci.yml@main

  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Read crate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep '^version = ' Cargo.toml | head -n1 | sed -E 's/version = "(.*)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

  prepare_deployer_assets:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - ci
    steps:
      - uses: actions/checkout@v4

      - name: Check out greentic-deployer
        uses: actions/checkout@v4
        with:
          repository: greenticai/greentic-deployer
          path: greentic-deployer

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Build and sync deployer pack
        shell: bash
        run: |
          set -euo pipefail
          bash ci/sync_deployer_pack.sh "$GITHUB_WORKSPACE/greentic-deployer" "$GITHUB_WORKSPACE/assets/deployer/terraform.gtpack"

      - name: Upload embedded deployer asset
        uses: actions/upload-artifact@v4
        with:
          name: embedded-deployer-assets
          path: assets/deployer/terraform.gtpack

  build_binaries:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    needs:
      - metadata
      - ci
      - prepare_deployer_assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_format: tgz
            run_tests: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_format: tgz
            run_tests: true
          - os: macos-15
            target: x86_64-apple-darwin
            archive_format: tgz
            run_tests: false
          - os: macos-15
            target: aarch64-apple-darwin
            archive_format: tgz
            run_tests: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_format: zip
            run_tests: true
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive_format: zip
            run_tests: false

    steps:
      - uses: actions/checkout@v4

      - name: Download embedded deployer asset
        uses: actions/download-artifact@v4
        with:
          name: embedded-deployer-assets
          path: assets/deployer

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Test native target
        if: matrix.run_tests
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          PKG_NAME="gtc-${{ matrix.target }}"
          mkdir -p "$PKG_NAME"
          cp "target/${{ matrix.target }}/release/gtc" "$PKG_NAME/"
          tar czf "$PKG_NAME.tgz" "$PKG_NAME"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkgName = "gtc-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $pkgName | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/gtc.exe" "$pkgName/"
          Compress-Archive -Path $pkgName -DestinationPath "$pkgName.zip"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: gtc-${{ matrix.target }}
          path: |
            gtc-${{ matrix.target }}.tgz
            gtc-${{ matrix.target }}.zip

  github_release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build_binaries
      - checksums
      - sbom
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: ${{ needs.metadata.outputs.version }}
          target_commitish: main
          files: dist/**/gtc-*

  checksums:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build_binaries
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          OUT="gtc-${{ needs.metadata.outputs.version }}-checksums.txt"
          find dist -type f \( -name 'gtc-*.tgz' -o -name 'gtc-*.zip' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#  dist/.*/#  #' > "$OUT"
          test -s "$OUT"

      - name: Upload checksum manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: gtc-${{ needs.metadata.outputs.version }}-checksums.txt

  sbom:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - metadata
      - ci
      - prepare_deployer_assets
    steps:
      - uses: actions/checkout@v4

      - name: Download embedded deployer asset
        uses: actions/download-artifact@v4
        with:
          name: embedded-deployer-assets
          path: assets/deployer

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Install cargo-sbom
        run: cargo install --locked cargo-sbom

      - name: Generate SPDX SBOM
        shell: bash
        run: |
          set -euo pipefail
          cargo sbom --output-format spdx_json_2_3 > "gtc-${{ needs.metadata.outputs.version }}.spdx.json"
          test -s "gtc-${{ needs.metadata.outputs.version }}.spdx.json"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: release-sbom
          path: gtc-${{ needs.metadata.outputs.version }}.spdx.json

  publish_crates:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - github_release
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - name: Publish crate to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          OUTPUT=$(cargo publish --token "$CARGO_REGISTRY_TOKEN" 2>&1)
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ]; then
            exit 0
          fi
          if echo "$OUTPUT" | grep -q "already exists"; then
            echo "::error::Version already published to crates.io — bump Cargo.toml before releasing again"
            {
              echo "## crates.io publish blocked"
              echo
              echo "The current crate version is already published."
              echo "Bump \`Cargo.toml\` before running the release workflow again."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "$OUTPUT"
            exit 1
          fi

  provenance:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build_binaries
      - checksums
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create build provenance attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/**/gtc-*.tgz
            dist/**/gtc-*.zip
            dist/release-checksums/gtc-${{ needs.metadata.outputs.version }}-checksums.txt
