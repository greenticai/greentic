name: Sync README to org profiles

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "greentic_readme_assets/**"

  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { org: greenticai, repo: .github }
          - { org: greentic-biz, repo: .github }
    steps:
      - name: Checkout greentic (source)
        uses: actions/checkout@v4

      - name: Mint GitHub App token (${{ matrix.target.org }})
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GREENTIC_CI_APP_ID }}
          private-key: ${{ secrets.GREENTIC_CI_APP_PRIVATE_KEY }}
          owner: ${{ matrix.target.org }}
          repositories: ${{ matrix.target.repo }}

      - name: Prepare profile README
        run: |
          cp README.md profile-readme.md

          # Rewrite relative image/asset paths to absolute raw.githubusercontent URLs
          sed -i 's|(greentic_readme_assets/|(https://raw.githubusercontent.com/greenticai/greentic/main/greentic_readme_assets/|g' profile-readme.md

          # Prepend auto-generated banner
          {
            echo "<!-- AUTO-GENERATED from greenticai/greentic@${GITHUB_SHA::7} — do not edit directly -->"
            echo ""
            cat profile-readme.md
          } > profile-readme-final.md

      - name: Open PR on ${{ matrix.target.org }}/${{ matrix.target.repo }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TARGET_REPO="${{ matrix.target.org }}/${{ matrix.target.repo }}"
          TARGET_URL="https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git"
          BRANCH="chore/sync-readme"
          SHORT_SHA="${GITHUB_SHA::7}"

          git clone --depth 1 "${TARGET_URL}" _target
          mkdir -p _target/profile

          cp profile-readme-final.md _target/profile/README.md

          cd _target

          # Check for actual diff against default branch
          if git diff --quiet -- profile/README.md; then
            echo "No changes to profile/README.md — skipping."
            exit 0
          fi

          git config user.name  "greentic-ci[bot]"
          git config user.email "greentic-ci[bot]@users.noreply.github.com"

          # Reset branch to current main so the PR always has exactly one commit
          git checkout -B "${BRANCH}"
          git add profile/README.md
          git commit -m "chore: sync profile README from greentic@${SHORT_SHA}"
          git push --force origin "${BRANCH}"

          # Create PR and merge immediately (no required status checks to wait on)
          EXISTING=$(gh pr list --repo "${TARGET_REPO}" --head "${BRANCH}" --json number --jq '.[0].number // empty')
          if [ -n "${EXISTING}" ]; then
            echo "PR #${EXISTING} already exists — force-pushed updated content."
            gh pr merge "${EXISTING}" --repo "${TARGET_REPO}" --merge
          else
            PR_URL=$(gh pr create \
              --repo "${TARGET_REPO}" \
              --head "${BRANCH}" \
              --title "chore: sync profile README from greentic@${SHORT_SHA}" \
              --body "Auto-generated by [sync-org-readme](https://github.com/greenticai/greentic/actions/workflows/sync-org-readme.yml) from greenticai/greentic@${SHORT_SHA}.")
            gh pr merge "${PR_URL}" --merge
          fi
